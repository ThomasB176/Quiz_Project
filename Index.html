<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <div class="container">
        <!-- Question Box on the left -->
        <div class="question-section">
            <div class="question-box">
                <h2 id="question">What is the name of this?</h2>
                <img id="question-image" src="images/placeholder.png" alt="Question Image">
            </div>
        </div>

        <!-- Answers Box on the right -->
        <div class="answers-section">
            <div class="answer-box" id="answer1">
                <p>name</p>
            </div>
            <div class="answer-box" id="answer2">
                <p>name</p>
            </div>
            <div class="answer-box" id="answer3">
                <p>name</p>
            </div>
            <div class="answer-box" id="answer4">
                <p>name</p>
            </div>
        </div>
    </div>

    <script src="Script.js"></script>
</body>
</html>
